apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: "{{ .Values.adminService.image.repository }}:{{ .Values.adminService.image.tag }}"
          imagePullPolicy: "{{ .Values.adminService.image.pullPolicy }}"
          ports:
            - containerPort: 8080
