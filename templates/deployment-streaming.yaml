apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming-service
  template:
    metadata:
      labels:
        app: streaming-service
    spec:
      containers:
        - name: streaming-service
          image: "{{ .Values.streamingService.image.repository }}:{{ .Values.streamingService.image.tag }}"
          imagePullPolicy: "{{ .Values.streamingService.image.pullPolicy }}"
          ports:
            - containerPort: 8080
