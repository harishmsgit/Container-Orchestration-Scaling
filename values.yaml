image:
  repository: 173554685967.dkr.ecr.ap-south-1.amazonaws.com
  tag: latest
  pullPolicy: Always

services:
  admin:
    name: streamingapp-admin
    port: 3003
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/streamingapp

  auth:
    name: streamingapp-auth
    port: 3001
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/streamingapp

  chat:
    name: streamingapp-chat
    port: 3004
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/streamingapp

  streaming:
    name: streamingapp-streaming
    port: 3002
    env:
      - name: MONGO_URI
        value: mongodb://mongodb:27017/streamingapp

  ui:
    name: streamingapp-ui
    port: 3000