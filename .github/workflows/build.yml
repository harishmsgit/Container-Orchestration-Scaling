name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 173554685967.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

  # Non-sensitive values from .env
  CLIENT_URLS: http://localhost:3000
  MONGO_DB: streamingapp
  AUTH_PORT: 3001
  STREAMING_PORT: 3002
  ADMIN_PORT: 3003
  CHAT_PORT: 3004
  STREAMING_PUBLIC_URL: http://localhost:3002
  REACT_APP_AUTH_API_URL: http://localhost:3001/api
  REACT_APP_STREAMING_API_URL: http://localhost:3002/api
  REACT_APP_STREAMING_PUBLIC_URL: http://localhost:3002
  REACT_APP_ADMIN_API_URL: http://localhost:3003/api/admin
  REACT_APP_CHAT_API_URL: http://localhost:3004/api/chat
  REACT_APP_CHAT_SOCKET_URL: http://localhost:3004

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push Admin Service
        run: |
          docker build \
            --build-arg MONGO_DB=${{ env.MONGO_DB }} \
            -t streamingapp-admin:$IMAGE_TAG ./backend/adminService
          docker tag streamingapp-admin:$IMAGE_TAG $ECR_REGISTRY/streamingapp-admin:$IMAGE_TAG
          docker push $ECR_REGISTRY/streamingapp-admin:$IMAGE_TAG

      - name: Build and push Auth Service
        run: |
          docker build \
            --build-arg MONGO_DB=${{ env.MONGO_DB }} \
            -t streamingapp-auth:$IMAGE_TAG ./backend/authService
          docker tag streamingapp-auth:$IMAGE_TAG $ECR_REGISTRY/streamingapp-auth:$IMAGE_TAG
          docker push $ECR_REGISTRY/streamingapp-auth:$IMAGE_TAG

      - name: Build and push Chat Service
        run: |
          docker build \
            --build-arg MONGO_DB=${{ env.MONGO_DB }} \
            -t streamingapp-chat:$IMAGE_TAG ./backend/chatService
          docker tag streamingapp-chat:$IMAGE_TAG $ECR_REGISTRY/streamingapp-chat:$IMAGE_TAG
          docker push $ECR_REGISTRY/streamingapp-chat:$IMAGE_TAG

      - name: Build and push Streaming Service
        run: |
          docker build \
            --build-arg MONGO_DB=${{ env.MONGO_DB }} \
            -t streamingapp-streaming:$IMAGE_TAG ./backend/streamingService
          docker tag streamingapp-streaming:$IMAGE_TAG $ECR_REGISTRY/streamingapp-streaming:$IMAGE_TAG
          docker push $ECR_REGISTRY/streamingapp-streaming:$IMAGE_TAG

      - name: Build and push UI Service
        run: |
          docker build \
            --build-arg REACT_APP_AUTH_API_URL=${{ env.REACT_APP_AUTH_API_URL }} \
            --build-arg REACT_APP_STREAMING_API_URL=${{ env.REACT_APP_STREAMING_API_URL }} \
            --build-arg REACT_APP_STREAMING_PUBLIC_URL=${{ env.REACT_APP_STREAMING_PUBLIC_URL }} \
            --build-arg REACT_APP_ADMIN_API_URL=${{ env.REACT_APP_ADMIN_API_URL }} \
            --build-arg REACT_APP_CHAT_API_URL=${{ env.REACT_APP_CHAT_API_URL }} \
            --build-arg REACT_APP_CHAT_SOCKET_URL=${{ env.REACT_APP_CHAT_SOCKET_URL }} \
            -t streamingapp-ui:$IMAGE_TAG ./frontend
          docker tag streamingapp-ui:$IMAGE_TAG $ECR_REGISTRY/streamingapp-ui:$IMAGE_TAG
          docker push $ECR_REGISTRY/streamingapp-ui:$IMAGE_TAG
